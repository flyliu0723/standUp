appId: com.standup.app
productName: standUp
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - package.json
asar: true
asarUnpack:
  - node_modules/koffi/**/*
extraResources:
  - from: resources
    to: resources
    filter:
      - '**/*'
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
portable:
  artifactName: standUp-${version}-portable.exe
